<template>
    <div class="venn-wrapper">
        <template lwc:if={hasCircles}>
            <svg xmlns="http://www.w3.org/2000/svg"
                 viewBox={viewBox}
                 class="venn-svg"
                 role="img"
                 aria-label="Venn diagram showing segment overlap">

                <!-- Clean white background -->
                <rect x="0" y="0" width="620" height="400"
                      fill="#FFFFFF">
                </rect>

                <!-- Circles -->
                <template for:each={circles} for:item="c">
                    <circle key={c.key}
                            cx={c.cx} cy={c.cy} r={c.r}
                            fill={c.fill}
                            stroke={c.stroke}
                            stroke-width="1.5">
                    </circle>
                </template>

                <!-- Count labels inside circles -->
                <template for:each={circles} for:item="c">
                    <text key={c.key}
                          x={c.countX} y={c.countY}
                          text-anchor="middle" dominant-baseline="middle"
                          font-family="'Salesforce Sans','Helvetica Neue',Helvetica,Arial,sans-serif"
                          font-size="15" font-weight="700" fill={c.txtFill}>
                        {c.count}
                    </text>
                </template>

                <!-- Segment name labels below circles -->
                <template for:each={circles} for:item="c">
                    <text key={c.key}
                          x={c.labelX} y={c.labelY}
                          text-anchor="middle"
                          font-family="'Salesforce Sans','Helvetica Neue',Helvetica,Arial,sans-serif"
                          font-size="11" font-weight="400" fill="#706E6B">
                        {c.label}
                    </text>
                </template>

            </svg>
        </template>
    </div>
</template>
