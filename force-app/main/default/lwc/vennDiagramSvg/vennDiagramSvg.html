<template>
    <div class="venn-container">
        <template lwc:if={hasCircles}>
            <!-- SVG diagram -->
            <div class="venn-svg-area">
                <svg xmlns="http://www.w3.org/2000/svg"
                     viewBox={viewBox}
                     class="venn-svg"
                     role="img"
                     aria-label="Interactive Venn diagram — click any zone to create a segment">

                    <!-- Clean white background -->
                    <rect x="0" y="0" width="620" height="400"
                          fill="#FFFFFF">
                    </rect>

                    <!-- Background circles (visual fill + stroke) -->
                    <template for:each={circles} for:item="c">
                        <circle key={c.key}
                                cx={c.cx} cy={c.cy} r={c.r}
                                fill={c.fill}
                                stroke={c.stroke}
                                stroke-width="1.5">
                        </circle>
                    </template>

                    <!-- Clickable zone paths (transparent overlay with hover effect) -->
                    <template for:each={zonePaths} for:item="zone">
                        <path key={zone.key}
                              d={zone.d}
                              class="zone-path"
                              data-include={zone.include}
                              data-exclude={zone.exclude}
                              onclick={handleZoneClick}
                              role="button"
                              tabindex="0">
                            <title>{zone.label}</title>
                        </path>
                    </template>

                    <!-- Count labels inside circles -->
                    <template for:each={circleCountLabels} for:item="c">
                        <text key={c.key}
                              x={c.x} y={c.y}
                              text-anchor="middle" dominant-baseline="middle"
                              font-family="'Salesforce Sans','Helvetica Neue',Helvetica,Arial,sans-serif"
                              font-size="15" font-weight="700" fill={c.txtFill}
                              class="label-text">
                            {c.count}
                        </text>
                    </template>

                    <!-- Instruction hint -->
                    <text x="310" y="390"
                          text-anchor="middle"
                          font-family="'Salesforce Sans','Helvetica Neue',Helvetica,Arial,sans-serif"
                          font-size="10" fill="#969492">
                        Click any region to create a segment
                    </text>

                </svg>
            </div>

            <!-- Side legend -->
            <div class="venn-legend">
                <p class="legend-title">Segments</p>
                <template for:each={legendItems} for:item="item">
                    <div key={item.key} class="legend-item">
                        <span class="legend-dot" style={item.dotStyle}></span>
                        <div class="legend-text">
                            <p class="legend-name">{item.name}</p>
                            <p class="legend-count">{item.formattedCount} members</p>
                        </div>
                    </div>
                </template>
            </div>
        </template>
    </div>
</template>
